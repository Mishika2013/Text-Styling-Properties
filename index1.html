<!DOCTYPE html>
<html>
    <head>
        <title>My superhero Card</title>
        <style>
            /* Typography- font, size, weight, color for the whole page*/
            body{
                background-color: darkblue;
                color: white;
                font-family: Arial,sans-serif;
            }
            /*Typography + Text shadow- Big bold title with an orange shadow*/
            .hero-name{
                font-size: 60px;
                font-weight: bold;
                color: yellow;
                text-shadow: 3px 3px orange;
            }
            /*Typography + Text ransform - tagline becomes title case*/
            .tagline {
                font-style: italic;
                color: lightblue;
                text-transform: capitalize;
            }
            /* Text transform + Text decortion- Section headings in CAPS with underline*/
            .label {
                text-transform: uppercase;
                text-decoration: underline;
                color: coral;
            }
            /* Typography - powers stand out in bold green */
            .power {
                font-weight: bold;
                color: lightgreen;
            }
            /*Typography - powers stand out in bold green*/
            .power {
                font-weight: bold;
                color: lightgreen;
            }
            /* Text- Decoration - weaknesses are crossed out*/
            .weakness {
                text-decoration: line-through;
                color: gray;

            }
            /*Tranform- the badge is tilted to the side */
            .badge {
                font-size: 28px;
                font-weight: bold;
                color: gold;
                transform: rotate(15deg);
            }
            /*Typography - footer text*/
            .made-by {
                color: coral;
                font-style: italic;
            }

        </style>
    </head>
    <body>
        <h1 class="hero-name"> Thunder KID</h1>
        <p class="tagline">The most powerful hero in the school</p>

        <h2 class="label"> Superpowers</h2>
            <p class="power">Can run faster than a cheetah </p>
            <p class="power">Can lift a school bus</p>

            <h2 class="label"> Weaknesses</h2>
            <p class="weakness">Maths homework</p>
            <p class="weakness">Broccoli</p>
            <p class="badge">Top hero</p>
            <p class="made-by"> Created by Mishika</p>
    </body>
</html>
